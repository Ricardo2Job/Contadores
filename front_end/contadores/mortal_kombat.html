<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador Mortal Kombat</title>
<link rel="stylesheet" href="../globals.css">
<style>
  body { display:flex; flex-direction:column; align-items:center; min-height:100vh; overflow-x:hidden; }
  .topbar { position:fixed; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; background:rgba(7,5,15,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); z-index:100; }
  .page-title { font-family:var(--display); font-size:1rem; font-weight:700; }
  .page-title span { color:var(--purple); }
  .status { display:inline-flex; align-items:center; gap:7px; font-size:11px; color:var(--txt2); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--txt3); flex-shrink:0; }
  .status-dot.connected { background:#22c55e; box-shadow:0 0 6px #22c55e; }
  .status-dot.loading { background:var(--purple); animation:pulse 1s ease-in-out infinite; }
  .status-dot.error { background:#ef4444; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .content { position:relative; z-index:1; width:100%; max-width:860px; padding:5.5rem 1.5rem 4rem; }
  .page-header { margin-bottom:2rem; animation:fadeUp 0.4s ease both; }
  .page-header h1 { font-family:var(--display); font-size:clamp(1.6rem,4vw,2.4rem); font-weight:800; margin-top:0.3rem; }

  /* SAVE BAR */
  .save-bar { display:flex; align-items:center; justify-content:space-between; padding:0.8rem 1.2rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:1.5rem; animation:fadeUp 0.4s 0.05s ease both; opacity:0; animation-fill-mode:forwards; }
  .changes-info { font-size:12px; color:var(--txt2); }
  .changes-info strong { color:var(--purple); }
  .btn-save { padding:0.5rem 1.4rem; background:var(--purple); border:none; color:#07050f; font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; border-radius:var(--radius); transition:all var(--transition); }
  .btn-save:hover { background:#c084fc; }
  .btn-save:disabled { opacity:0.35; cursor:not-allowed; }

  /* JUGADOR SECTIONS */
  .section-wrap { display:flex; flex-direction:column; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:1.5rem; animation:fadeUp 0.4s 0.1s ease both; opacity:0; animation-fill-mode:forwards; }

  .player-section { background:var(--bg2); }
  .player-section-header { display:flex; align-items:center; gap:10px; padding:1rem 1.2rem; border-bottom:1px solid rgba(168,85,247,0.1); }
  .ps-name { font-family:var(--display); font-size:1.05rem; font-weight:700; }
  .ps-total { font-size:11px; letter-spacing:0.1em; color:var(--txt2); margin-left:auto; }
  .ps-total span { color:var(--purple); font-weight:700; }

  /* MATCHUP ROWS */
  .matchups { display:flex; flex-direction:column; }
  .matchup-row { display:flex; align-items:center; gap:0; border-bottom:1px solid rgba(168,85,247,0.06); }
  .matchup-row:last-child { border-bottom:none; }

  .vs-label { padding:0.75rem 1.2rem; font-size:12px; color:var(--txt2); min-width:110px; flex-shrink:0; }
  .vs-label strong { color:var(--txt); }

  .score-display { font-family:var(--display); font-size:1.6rem; font-weight:800; color:var(--purple); min-width:50px; padding:0.5rem 0.8rem; transition:transform 0.1s; }
  .score-display.bump { transform:scale(1.2); }

  /* BAR INLINE */
  .bar-inline-wrap { flex:1; padding:0 0.8rem; display:flex; align-items:center; }
  .bar-inline-track { height:5px; background:rgba(168,85,247,0.12); border-radius:3px; overflow:hidden; flex:1; }
  .bar-inline-fill { height:100%; background:var(--purple); border-radius:3px; transition:width 0.5s cubic-bezier(.4,0,.2,1); min-width:3px; }

  .matchup-btns { display:flex; gap:6px; padding:0.6rem 1rem; flex-shrink:0; }
  .btn-sm { width:32px; height:32px; background:transparent; border:1px solid var(--border); color:var(--txt2); font-family:var(--mono); font-size:0.9rem; font-weight:700; cursor:pointer; border-radius:var(--radius); transition:all var(--transition); display:flex;align-items:center;justify-content:center; }
  .btn-sm.plus:hover { border-color:var(--purple); color:var(--purple); background:var(--purple-glow); }
  .btn-sm.minus:hover { border-color:rgba(239,68,68,0.4); color:#ef4444; background:rgba(239,68,68,0.08); }

  /* RATIO CHART */
  .chart-box { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:1.4rem; animation:fadeUp 0.4s 0.2s ease both; opacity:0; animation-fill-mode:forwards; }
  .chart-title { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--txt2); margin-bottom:1.2rem; }
  .ratio-list { display:flex; flex-direction:column; gap:10px; }
  .ratio-row { display:flex; flex-direction:column; gap:4px; }
  .ratio-label-row { display:flex; justify-content:space-between; font-size:12px; }
  .ratio-name { color:var(--txt); }
  .ratio-pct { color:var(--txt2); }
  .ratio-track { height:6px; background:rgba(168,85,247,0.12); border-radius:3px; overflow:hidden; }
  .ratio-fill { height:100%; border-radius:3px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }
</style>
</head>
<body class="grid-bg">
<div class="glow-orb"></div>

<div class="topbar">
  <a href="../main/index.html" class="btn-back">← inicio</a>
  <span class="page-title">Mortal <span>Kombat</span></span>
  <div class="status">
    <div class="status-dot loading" id="statusDot"></div>
    <span id="statusText">conectando...</span>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <p class="section-label">// 1 vs 1</p>
    <h1>Mortal Kombat<span class="cursor"></span></h1>
  </div>

  <div class="save-bar">
    <span class="changes-info">Cambios pendientes: <strong id="pendingCount">0</strong></span>
    <button class="btn-save" id="btnSave" disabled onclick="guardarCambios()">Guardar cambios</button>
  </div>

  <div class="section-wrap" id="sectionsWrap"></div>

  <div class="chart-box">
    <div class="chart-title">// ratio de victorias totales</div>
    <div class="ratio-list" id="ratioChart"></div>
  </div>
</div>

<script type="module">
  import { cargarDatos, inicializarSiNoExiste } from '../../back_end/firebase.js';
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const COLECCION = 'contadores';
  const DOCUMENTO = 'mortal_kombat';
  const JUGADORES = ['Ricardo','Vengador','SAI'];
  const COLORES   = ['#a855f7','#f59e0b','#22c55e'];

  // Genera key para el matchup
  const key = (a, b) => `${a}_vs_${b}`;

  // Genera todos los pares posibles
  function pares() {
    const p = [];
    for (let i = 0; i < JUGADORES.length; i++)
      for (let j = 0; j < JUGADORES.length; j++)
        if (i !== j) p.push([JUGADORES[i], JUGADORES[j]]);
    return p;
  }

  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const pendingEl  = document.getElementById('pendingCount');
  const btnSave    = document.getElementById('btnSave');

  let datos   = {};
  let cambios = 0;

  // Valores default
  const valDefault = {};
  pares().forEach(([a, b]) => valDefault[key(a,b)] = 0);

  // ---- TOTALES por jugador ----
  function totalJugador(nombre) {
    return JUGADORES.filter(j => j !== nombre)
      .reduce((s, opp) => s + (datos[key(nombre, opp)] ?? 0), 0);
  }

  // ---- RENDER ----
  function render() {
    const wrap = document.getElementById('sectionsWrap');
    wrap.innerHTML = '';

    JUGADORES.forEach(jugador => {
      const rivals = JUGADORES.filter(j => j !== jugador);
      const maxVs  = Math.max(...rivals.map(r => datos[key(jugador,r)]??0), 1);
      const total  = totalJugador(jugador);

      const section = document.createElement('div');
      section.className = 'player-section';
      section.innerHTML = `
        <div class="player-section-header">
          <span class="ps-name">${jugador}</span>
          <span class="ps-total">Total victorias: <span>${total}</span></span>
        </div>
        <div class="matchups" id="matchups-${jugador}"></div>`;
      wrap.appendChild(section);

      const matchupsEl = section.querySelector(`#matchups-${jugador}`);
      rivals.forEach(rival => {
        const k   = key(jugador, rival);
        const val = datos[k] ?? 0;
        const pct = Math.round((val / maxVs) * 100);

        const row = document.createElement('div');
        row.className = 'matchup-row';
        row.innerHTML = `
          <div class="vs-label">vs <strong>${rival}</strong></div>
          <div class="score-display" id="sc-${k}">${val}</div>
          <div class="bar-inline-wrap">
            <div class="bar-inline-track">
              <div class="bar-inline-fill" id="bar-${k}" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="matchup-btns">
            <button class="btn-sm minus" onclick="restar('${k}','${jugador}')">−</button>
            <button class="btn-sm plus"  onclick="sumar('${k}','${jugador}')">+</button>
          </div>`;
        matchupsEl.appendChild(row);
      });
    });

    renderRatio();
  }

  // ---- RATIO CHART ----
  function renderRatio() {
    const ratioEl = document.getElementById('ratioChart');
    const totales = JUGADORES.map(j => ({ nombre:j, total:totalJugador(j) }));
    const totalSum = totales.reduce((s,t) => s+t.total, 0);

    if (totalSum === 0) {
      ratioEl.innerHTML = '<span style="font-size:12px;color:var(--txt3)">sin datos aún</span>';
      return;
    }

    ratioEl.innerHTML = '';
    totales.sort((a,b) => b.total - a.total).forEach((t, i) => {
      const pct   = Math.round((t.total/totalSum)*100);
      const color = COLORES[JUGADORES.indexOf(t.nombre)] || 'var(--purple)';
      ratioEl.innerHTML += `
        <div class="ratio-row">
          <div class="ratio-label-row">
            <span class="ratio-name">${t.nombre} <span style="color:var(--txt3);font-size:11px">(${t.total} victorias)</span></span>
            <span class="ratio-pct">${pct}%</span>
          </div>
          <div class="ratio-track"><div class="ratio-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
    });
  }

  // ---- BUMP ----
  function bump(k) {
    const el = document.getElementById(`sc-${k}`);
    if (!el) return;
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 130);
  }

  // ---- ACTUALIZAR BARRA INLINE ----
  function updateBar(k, jugador) {
    const rivals = JUGADORES.filter(j => j !== jugador);
    const maxVs  = Math.max(...rivals.map(r => datos[key(jugador,r)]??0), 1);
    rivals.forEach(rival => {
      const rk  = key(jugador, rival);
      const bar = document.getElementById(`bar-${rk}`);
      if (bar) bar.style.width = Math.round(((datos[rk]??0)/maxVs)*100) + '%';
    });
  }

  // ---- ACTUALIZAR TOTALES ----
  function updateTotals() {
    JUGADORES.forEach(jugador => {
      const wrap = document.querySelector(`#matchups-${jugador}`)?.closest('.player-section');
      if (!wrap) return;
      const totalEl = wrap.querySelector('.ps-total span');
      if (totalEl) totalEl.textContent = totalJugador(jugador);
    });
  }

  // ---- HANDLERS ----
  window.sumar = (k, jugador) => {
    datos[k] = (datos[k]??0) + 1;
    const el = document.getElementById(`sc-${k}`);
    if (el) el.textContent = datos[k];
    bump(k);
    updateBar(k, jugador);
    updateTotals();
    cambios++;
    pendingEl.textContent = cambios;
    btnSave.disabled = false;
    renderRatio();
  };

  window.restar = (k, jugador) => {
    if ((datos[k]??0) <= 0) return;
    datos[k]--;
    const el = document.getElementById(`sc-${k}`);
    if (el) el.textContent = datos[k];
    bump(k);
    updateBar(k, jugador);
    updateTotals();
    cambios++;
    pendingEl.textContent = cambios;
    btnSave.disabled = false;
    renderRatio();
  };

  // ---- GUARDAR ----
  window.guardarCambios = async () => {
    btnSave.disabled = true;
    btnSave.textContent = 'Guardando...';
    try {
      const { db } = await import('../../back_end/firebase.js');
      const ref = doc(db, COLECCION, DOCUMENTO);
      await setDoc(ref, datos);
      cambios = 0;
      pendingEl.textContent = 0;
      btnSave.textContent = '✓ Guardado';
      setTimeout(() => { btnSave.textContent = 'Guardar cambios'; }, 2000);
    } catch(e) {
      console.error(e);
      btnSave.textContent = 'Error — reintentar';
      btnSave.disabled = false;
    }
  };

  // ---- INIT ----
  async function init() {
    try {
      await inicializarSiNoExiste(COLECCION, DOCUMENTO, valDefault);
      const cargado = await cargarDatos(COLECCION, DOCUMENTO);
      datos = { ...valDefault, ...(cargado ?? {}) };
      render();
      statusDot.className    = 'status-dot connected';
      statusText.textContent = 'conectado';
    } catch(e) {
      console.error(e);
      statusDot.className    = 'status-dot error';
      statusText.textContent = 'error de conexión';
      datos = { ...valDefault };
      render();
    }
  }

  init();
</script>
</body>
</html>
