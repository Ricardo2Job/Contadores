<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  .container { position:relative; z-index:1; width:100%; max-width:560px; padding:2rem; display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
  .header { text-align:center; margin-bottom:2.5rem; }
  .name { font-family:var(--display); font-size:2.8rem; font-weight:800; letter-spacing:-0.02em; line-height:1; }
  .name span { color:var(--purple); }
  .subtitle { margin-top:0.5rem; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--txt2); }
  .nav-link { width:100%; display:flex; align-items:center; justify-content:space-between; padding:0.9rem 1.2rem; background:var(--bg2); border:1px solid var(--purple-border); color:var(--txt2); text-decoration:none; font-family:var(--mono); font-size:13px; letter-spacing:0.08em; border-radius:var(--radius); transition:all 0.2s; animation:fadeUp 0.5s ease both; opacity:0; animation-fill-mode:forwards; }
  .nav-link:hover { border-color:var(--purple); color:var(--purple); background:var(--bg3); }
  .nav-left { display:flex; align-items:center; gap:10px; }
  .nav-icon { width:22px; height:22px; border:1px solid var(--purple-border); display:flex; align-items:center; justify-content:center; font-size:12px; border-radius:2px; flex-shrink:0; }
  .nav-meta { display:flex; align-items:center; gap:8px; }
  .nav-count { font-size:10px; color:var(--txt3); }
  .nav-arrow { font-size:12px; transition:transform 0.2s; }
  .nav-link:hover .nav-arrow { transform:translateX(3px); color:var(--purple); }
  .back-wrap { margin-top:1.5rem; }
</style>

</div>
<script type="module">
  import { cargarDatos } from '../../back_end/firebase.js';
  try {
    const d = await cargarDatos('pendientes','counts');
    if (d) {
      document.getElementById('cnt-pel').textContent = (d.peliculas||0) + ' items';
      document.getElementById('cnt-ser').textContent = (d.series||0)   + ' items';
      document.getElementById('cnt-jue').textContent = (d.juegos||0)   + ' items';
    }
  } catch(e) {}
</script>
